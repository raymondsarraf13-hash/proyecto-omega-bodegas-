      ms.forEach(function(m){if(m>=a.sm)rev[yi]+=a.m2*p.occ*a.bp*(1+p.ps)*Math.pow(1+mi,m);});
    }
  });
  var noi=rev.map(function(r){return r*(1-p.opex);});
  var dR=[p.disc-0.02,p.disc-0.01,p.disc,p.disc+0.01,p.disc+0.02],
    crS=[p.cap,p.cap+0.01,p.cap+0.02],
    crC=[p.cap,p.cap+0.005,p.cap+0.01,p.cap+0.015,p.cap+0.02];
  var sOp=dR.map(function(dr){
    var vp=0;for(var t=1;t<=10;t++)vp+=noi[t]/Math.pow(1+dr,t);
    return crS.map(function(cr){
      var tv=(noi[10]*(1+INF)/cr)/Math.pow(1+dr,10);
      var val=(vp+tv)*Math.pow(1+dr,0.5);
      return{value:val,moic:tInv>0?val/tInv:0};
    });
  });
  var cOp=dR.map(function(dr){
    return crC.map(function(cr){
      return Array.from({length:10},function(_,ti){
        var t=ti+1,vpN=0;
        for(var k=1;k<=t;k++)vpN+=noi[k]/Math.pow(1+dr,k);
        vpN*=Math.pow(1+dr,0.5);
        var vpE=(noi[t]/cr/Math.pow(1+dr,t))*Math.pow(1+dr,0.5);
        var tv=vpN+vpE;
        return{totalValue:tv,moic:tInv>0?tv/tInv:0};
      });
    });
  });
  var ai=aa.map(function(a){return{name:a.id,m2:a.m2,price:a.bp*(1+p.ps)};});
  var wP=tM2>0?aa.reduce(function(s,a){return s+a.m2*a.bp*(1+p.ps);},0)/tM2:0;
  return{tInv:tInv,tTer:tTer,tCon:tCon,tM2:tM2,wP:wP,noi:noi,sOp:sOp,cOp:cOp,dR:dR,crS:crS,crC:crC,ai:ai};
}

/* ── Edge-aware highlight: outer borders only, GREEN ── */
function sEdge(dR,crS,i,j){
  if(!inHL(dR[i],crS[j]))return null;
  return{
    top:i===0||!inHL(dR[i-1],crS[j]),
    bot:i===dR.length-1||!inHL(dR[i+1],crS[j]),
    left:j===0||!inHL(dR[i],crS[j-1]),
    right:j===crS.length-1||!inHL(dR[i],crS[j+1])
  };
}
function cEdge(dR,crC,di,ci,yi,maxYi){
  if(!inHL(dR[di],crC[ci]))return null;
  return{
    top:ci===0||!inHL(dR[di],crC[ci-1]),
    bot:ci===crC.length-1||!inHL(dR[di],crC[ci+1]),
    left:yi===0,
    right:yi===maxYi
  };
}

function eStyle(base,e){
  if(!e)return base;
  var b={};
  if(e.top)b.borderTop="2.5px solid "+C.hlGreen;
  if(e.bot)b.borderBottom="2.5px solid "+C.hlGreen;
  if(e.left)b.borderLeft="2.5px solid "+C.hlGreen;
  if(e.right)b.borderRight="2.5px solid "+C.hlGreen;
  return Object.assign({},base,{background:C.hlBg},b);
}

function SopTbl(props){

function CopTbl(props){

          <div onClick={function(){setShowInfo(false);}} style={{position:"absolute",top:14,right:18,width:28,height:28,borderRadius:"50%",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:16,color:C.dark,fontWeight:700}}>✕</div>

          {/* Logo + Title */}
          <div style={{textAlign:"center",marginBottom:20}}>
            <img src={LOGO} alt="RMR Capital" style={{height:50,objectFit:"contain",filter:"invert(40%) sepia(10%) saturate(500%) hue-rotate(160deg)",marginBottom:8}}/>
            <div style={{fontSize:18,fontWeight:800,color:C.dark,letterSpacing:0.3}}>PROYECTO OMEGA</div>
            <div style={{fontSize:11,color:C.mid}}>Bodegas Guadalajara — Modelo de Valuación Interactivo</div>
          </div>

          {/* Descripción */}
          <div style={{marginBottom:24}}>
            <div style={{fontSize:14,fontWeight:700,color:C.dark,marginBottom:8,display:"flex",alignItems:"center",gap:8,borderBottom:"2px solid "+C.accent,paddingBottom:8}}><span style={badge(C.dark)}>01</span>Descripción del Ejercicio</div>
            <p style={{fontSize:12,color:C.black,lineHeight:1.7}}>
              Modelo interactivo para la valuación de un portafolio de bodegas ubicadas en la zona metropolitana de Guadalajara. El ejercicio evalúa el valor presente del portafolio bajo dos escenarios: (1) venta inmediata sin operar los activos ("Valor s/ Operación"), donde el valor se determina por el VP de los flujos de NOI proyectados más un valor terminal descontado; y (2) operación y venta en diferentes horizontes de tiempo ("Valor c/ Operación"), donde se acumula el VP del NOI generado durante la operación más el VP del valor de salida al momento de una potencial venta. Ambos escenarios incorporan un ajuste de medio año (Mid-Year Convention) y permiten sensibilizar las variables clave del negocio y de valuación en tiempo real.
            </p>
          </div>

          {/* Instrucciones */}
          <div style={{marginBottom:24}}>
            <div style={{fontSize:14,fontWeight:700,color:C.dark,marginBottom:8,display:"flex",alignItems:"center",gap:8,borderBottom:"2px solid "+C.accent,paddingBottom:8}}><span style={badge(C.dark)}>02</span>Instrucciones de Uso</div>
            <p style={{fontSize:12,color:C.black,lineHeight:1.7,marginBottom:10}}>El panel de <strong>Supuestos</strong> permite modificar los parámetros del modelo:</p>
            <div style={{background:C.bg,borderRadius:8,padding:"12px 16px",marginBottom:10}}>
              <div style={{marginBottom:8}}><strong style={{color:C.dark}}>Selección de Activos:</strong> <span style={{color:C.black,fontSize:12}}>Activa o desactiva cada bodega del portafolio para evaluar combinaciones específicas de activos.</span></div>
              <div style={{marginBottom:8}}><strong style={{color:C.dark}}>Δ Precio Renta (%):</strong> <span style={{color:C.black,fontSize:12}}>Ajusta la variación sobre el precio base de renta por m² (rango: −10% a +15%).</span></div>
              <div style={{marginBottom:8}}><strong style={{color:C.dark}}>Ocupación (%):</strong> <span style={{color:C.black,fontSize:12}}>Define el porcentaje de ocupación asumido para el portafolio (rango: 0% a 100%).</span></div>
              <div style={{marginBottom:8}}><strong style={{color:C.dark}}>OpEx + G&A (% Ing):</strong> <span style={{color:C.black,fontSize:12}}>Establece los gastos operativos y de administración como porcentaje de los ingresos brutos.</span></div>
              <div style={{marginBottom:8}}><strong style={{color:C.dark}}>Tasa de Descuento:</strong> <span style={{color:C.black,fontSize:12}}>Costo de capital utilizado para descontar los flujos futuros (rango: 9.0% a 15.0%).</span></div>
              <div><strong style={{color:C.dark}}>Cap Rate:</strong> <span style={{color:C.black,fontSize:12}}>Tasa de capitalización utilizada para calcular el valor terminal y los valores de salida (rango: 7.5% a 10.0%).</span></div>
            </div>
            <p style={{fontSize:12,color:C.black,lineHeight:1.7}}>
              Los resultados se actualizan automáticamente al modificar cualquier supuesto. Las tres pestañas inferiores muestran: un resumen comparativo side-by-side, el detalle de valuación sin operación, y el detalle de valuación con operación. Las celdas resaltadas en verde indican los rangos de Tasa de Descuento (12.0%–14.0%) y Cap Rate (8.5%–9.5%) que representan los parámetros más probables de valuación por parte de inversionistas institucionales en el mercado mexicano.
            </p>
          </div>

          {/* Disclaimer */}
          <div>
            <div style={{fontSize:14,fontWeight:700,color:C.dark,marginBottom:8,display:"flex",alignItems:"center",gap:8,borderBottom:"2px solid "+C.accent,paddingBottom:8}}><span style={badge(C.accent)}>!</span>Aviso Legal</div>
            <div style={{background:C.bg,borderRadius:8,padding:"14px 18px",fontSize:11,color:C.dark,lineHeight:1.8,borderLeft:"3px solid "+C.accent}}>
              <p style={{marginBottom:10}}>Este documento ha sido preparado por RMR Capital exclusivamente con fines informativos e indicativos. La información, supuestos, proyecciones y resultados aquí presentados no constituyen una oferta, solicitud, recomendación ni asesoría de inversión de ningún tipo. Los valores y rendimientos proyectados se basan en estimaciones y supuestos que pueden no materializarse y no representan una garantía de desempeño futuro. Los resultados reales pueden diferir materialmente de las proyecciones presentadas.</p>
              <p style={{marginBottom:10}}>Este material es estrictamente confidencial y es propiedad exclusiva de RMR Capital. Queda prohibida su reproducción, distribución o divulgación total o parcial a terceros sin la autorización previa y por escrito de RMR Capital. Al acceder a este documento, el receptor acepta mantener la confidencialidad de su contenido y utilizarlo únicamente para los fines autorizados por RMR Capital.</p>
              <p>RMR Capital no asume responsabilidad alguna por decisiones de inversión tomadas con base en la información aquí contenida. Se recomienda a los potenciales inversionistas realizar su propio análisis independiente y consultar a sus asesores legales, fiscales y financieros antes de tomar cualquier decisión de inversión.</p>
            </div>
          </div>
        </div>
      </div>
    )}
  </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

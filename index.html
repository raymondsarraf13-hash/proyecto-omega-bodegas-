const INF_DEFAULT = 0.05656;

function fmt(v, type) {
  type = type || "currency";
  if (v == null || isNaN(v)) return "—";
  if (type === "currency") return "$" + Math.round(v).toLocaleString("en-US");
  if (type === "currencyM") return "$" + (v / 1e6).toFixed(2) + "M";
  if (type === "pct") return (v * 100).toFixed(1) + "%";
  if (type === "moic") return v.toFixed(3) + "x";
  if (type === "num") return v.toLocaleString("en-US", { maximumFractionDigits: 0 });
  if (type === "price") return "$" + v.toFixed(1);
  return String(v);
}

function inRange(dr, cr) {
  var drOk = dr >= 0.1195 && dr <= 0.1405;
  var crOk = cr >= 0.0845 && cr <= 0.0955;
  return drOk && crOk;
}

function computeModel(p) {
  var switches = p.switches, priceSens = p.priceSens, occupancy = p.occupancy, opex = p.opex, discount = p.discount, capRate = p.capRate;
  var inflation = INF_DEFAULT;
  var monthlyInf = inflation / 12;
  var activeAssets = ASSETS.filter(function(_, i) { return switches[i]; });
  var totalTerreno = activeAssets.reduce(function(s, a) { return s + a.terreno; }, 0);
  var totalConst = activeAssets.reduce(function(s, a) { return s + a.construccion; }, 0);
  var totalInv = totalTerreno + totalConst;
  var totalM2 = activeAssets.reduce(function(s, a) { return s + a.m2Rent; }, 0);

  var revenue = new Array(11).fill(0);
  for (var ai = 0; ai < activeAssets.length; ai++) {
    var asset = activeAssets[ai];
    for (var yi = 0; yi < 11; yi++) {
      var months = yi === 0 ? [0] : Array.from({ length: 12 }, function(_, k) { return (yi - 1) * 12 + 1 + k; });
      for (var mi = 0; mi < months.length; mi++) {
        var mo = months[mi];
        if (mo >= asset.startMonth) {
          revenue[yi] += asset.m2Rent * occupancy * asset.basePrice * (1 + priceSens) * Math.pow(1 + monthlyInf, mo);
        }
      }
    }
  }
  var noi = revenue.map(function(r) { return r * (1 - opex); });

  var dRates = [discount - 0.02, discount - 0.01, discount, discount + 0.01, discount + 0.02];
  var crS = [capRate, capRate + 0.01, capRate + 0.02];

  var sOp = dRates.map(function(dr) {
    var vpFlows = 0;
    for (var t = 1; t <= 10; t++) vpFlows += noi[t] / Math.pow(1 + dr, t);
    return crS.map(function(cr) {
      var terminal = (noi[10] * (1 + inflation) / cr) / Math.pow(1 + dr, 10);
      var value = (vpFlows + terminal) * Math.pow(1 + dr, 0.5);
      var moic = totalInv > 0 ? value / totalInv : 0;
      return { value: value, moic: moic };
    });
  });

  var crC = [capRate, capRate + 0.005, capRate + 0.01, capRate + 0.015, capRate + 0.02];
  var cOp = dRates.map(function(dr) {
    return crC.map(function(cr) {
      return Array.from({ length: 10 }, function(_, ti) {
        var t = ti + 1;
        var vpNOI = 0;
        for (var k = 1; k <= t; k++) vpNOI += noi[k] / Math.pow(1 + dr, k);
        vpNOI *= Math.pow(1 + dr, 0.5);
        var vpExit = (noi[t] / cr / Math.pow(1 + dr, t)) * Math.pow(1 + dr, 0.5);
        var totalValue = vpNOI + vpExit;
        var moic = totalInv > 0 ? totalValue / totalInv : 0;
        return { vpNOI: vpNOI, vpExit: vpExit, totalValue: totalValue, moic: moic };
      });
    });
  });

  var assetInfo = activeAssets.map(function(a) { return { name: a.id, m2: a.m2Rent, price: a.basePrice * (1 + priceSens) }; });
  var wAvgPrice = totalM2 > 0 ? activeAssets.reduce(function(s, a) { return s + a.m2Rent * a.basePrice * (1 + priceSens); }, 0) / totalM2 : 0;

  return { totalInv: totalInv, totalTerreno: totalTerreno, totalConst: totalConst, totalM2: totalM2, wAvgPrice: wAvgPrice, noi: noi, revenue: revenue, sOp: sOp, cOp: cOp, dRates: dRates, crS: crS, crC: crC, assetInfo: assetInfo };
}

function cellStyle(edges) {

function getEdges(isHL, isTop, isBot, isLeft, isRight) {

}


function sOpEdges(dRates, crS, i, j) {
  var dr = dRates[i], cr = crS[j];
  if (!inRange(dr, cr)) return null;
  var top = (i === 0) || !inRange(dRates[i-1], cr);
  var bot = (i === dRates.length - 1) || !inRange(dRates[i+1], cr);
  var left = (j === 0) || !inRange(dr, crS[j-1]);
  var right = (j === crS.length - 1) || !inRange(dr, crS[j+1]);
  return { top: top, bottom: bot, left: left, right: right };

  var top = (ci === 0) || !inRange(dr, crC[ci-1]);
  var bot = (ci === crC.length - 1) || !inRange(dr, crC[ci+1]);
  return { top: top, bottom: bot, left: true, right: true };
}

              <div style={{ fontSize: 10, color: C.mid, fontStyle: "italic", marginTop: 14, padding: "8px 12px", background: C.bg, borderRadius: 6, borderLeft: "3px solid " + C.dark }}>{hlNote}</div>
            </div>
          )}
        </div>
        <div style={{ textAlign: "center", padding: "8px 0", fontSize: 10, color: C.mid }}>Proyecto Omega — Modelo de Valuación Interactivo | Datos base: Marzo 2026</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
